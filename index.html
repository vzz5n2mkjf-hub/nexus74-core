<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS74 — Рабочая версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, Arial, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            padding: 16px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #667eea; font-size: 24px; margin-bottom: 16px; }
        .panel {
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .panel h3 { color: #667eea; margin-bottom: 10px; font-size: 15px; }
        pre {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 6px;
            font-size: 10px;
            max-height: 120px;
            overflow: auto;
            color: #a0a0a0;
        }
        .fp {
            color: #34c759;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: rgba(52,199,89,0.05);
            padding: 8px;
            border-radius: 6px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            font-size: 14px;
        }
        textarea { min-height: 60px; resize: vertical; }
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 6px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-encrypt { background: #34c759; }
        .btn-decrypt { background: #667eea; }
        .btn-tamper { background: #ff3b30; }
        .result {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        .result.ok { background: rgba(52,199,89,0.1); border-left: 3px solid #34c759; }
        .result.err { background: rgba(255,59,48,0.1); border-left: 3px solid #ff3b30; }
        .result.info { background: rgba(102,126,234,0.1); border-left: 3px solid #667eea; }
        .modes { display: flex; gap: 6px; margin-bottom: 10px; }
        .mode-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            color: #8e8e93;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
        }
        .mode-btn.active { border-color: #34c759; color: #34c759; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 NEXUS74</h1>

        <div class="panel">
            <h3>🐠 Аквариум</h3>
            <pre id="aqua">...</pre>
        </div>

        <div class="panel">
            <h3>🚗 Автомобиль</h3>
            <pre id="veh">...</pre>
        </div>

        <div class="panel">
            <h3>🇷🇺 MOEX</h3>
            <pre id="moex">...</pre>
        </div>

        <div class="panel">
            <h3>🔑 Отпечаток P(t)</h3>
            <div class="fp" id="fp">—</div>
        </div>

        <div class="panel">
            <h3>🛡️ Режим</h3>
            <div class="modes">
                <div class="mode-btn active" onclick="setMode('std', this)">🟢 256 бит</div>
                <div class="mode-btn" onclick="setMode('par', this)">🟡 1024 бит</div>
                <div class="mode-btn" onclick="setMode('otp', this)">🔴 OTP</div>
            </div>
        </div>

        <div class="panel">
            <h3>🧪 Тест</h3>
            <input id="pwd" type="password" value="demo2026" placeholder="Пароль">
            <textarea id="msg" placeholder="Сообщение">челябинск</textarea>
            <button class="btn-encrypt" onclick="doEncrypt()">🔒 Зашифровать</button>
            <button class="btn-decrypt" onclick="doDecrypt()">🔓 Расшифровать</button>
            <button class="btn-tamper" onclick="doTamper()">⚠️ Атака</button>
            <div class="result info" id="res">Готов</div>
        </div>
    </div>

    <script>
    // ===== ГЛОБАЛЬНЫЕ =====
    let mode = 'std';
    let lastEnc = null;

    // ===== PRNG =====
    function rng(seed) {
        let s = seed;
        return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    }

    // ===== ИСТОЧНИКИ ЭНТРОПИИ =====
    function getAqua(t) {
        const r = rng(t);
        return {
            temp: 24 + Math.sin(t/10000)*0.5 + (r()-0.5)*0.1,
            ph: 7 + Math.sin(t/15000)*0.2 + (r()-0.5)*0.05,
            fish: Array.from({length:16}, () => Math.floor(r()*256))
        };
    }

    function getVeh(t) {
        const r = rng(t);
        return {
            speed: 40 + Math.sin(t/5000)*30 + r()*5,
            rpm: 2000 + Math.sin(t/3000)*1500 + r()*100,
            lat: 55.7558 + Math.sin(t/20000)*0.01
        };
    }

    function getMoex(t) {
        const r = rng(t + 7777);
        return {
            sber: 270 + Math.sin(t/100000)*10 + r()*5,
            moex: 3200 + Math.cos(t/80000)*50 + r()*20,
            usd: 92 + Math.sin(t/120000)*2 + (r()-0.5)*0.5
        };
    }

    // ===== ХЭШ =====
    async function sha256(data) {
        const bytes = new TextEncoder().encode(typeof data === 'string' ? data : JSON.stringify(data));
        const buf = await window.crypto.subtle.digest('SHA-256', bytes);
        return new Uint8Array(buf);
    }

    // ===== КЛЮЧ ИЗ ПАРОЛЯ =====
    async function makeKey(password, salt) {
        const enc = new TextEncoder();
        const mat = await window.crypto.subtle.importKey(
            'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        const key = await window.crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
            mat,
            { name: 'AES-GCM', length: 256 },
            true, ['encrypt', 'decrypt']
        );
        return await window.crypto.subtle.exportKey('raw', key);
    }

    // ===== ШИФРОВАНИЕ AES-GCM =====
    async function aesEncrypt(keyBytes, data) {
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await window.crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['encrypt']);
        const ct = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
        return { iv, ct: new Uint8Array(ct) };
    }

    async function aesDecrypt(keyBytes, iv, ct) {
        const key = await window.crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
        const pt = await window.crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return new Uint8Array(pt);
    }

    // ===== РЕЖИМ: СТАНДАРТ (256 бит) =====
    async function encStd(data, pwd, snap) {
        const fp = await sha256(snap);
        const key = await makeKey(pwd, fp);
        const { iv, ct } = await aesEncrypt(key, data);
        return { mode: 'std', iv, ct, snap, bits: 256 };
    }

    async function decStd(enc, pwd) {
        const fp = await sha256(enc.snap);
        const key = await makeKey(pwd, fp);
        return await aesDecrypt(key, enc.iv, enc.ct);
    }

    // ===== РЕЖИМ: ПАРАНОИК (1024 бит = 4 слоя) =====
    async function encPar(data, pwd, snap) {
        let cur = data;
        const layers = [];
        for (let i = 0; i < 4; i++) {
            const layerSnap = { ...snap, layer: i };
            const fp = await sha256(layerSnap);
            const key = await makeKey(pwd + '_L' + i, fp);
            const { iv, ct } = await aesEncrypt(key, cur);
            cur = ct;
            layers.push({ iv, snap: layerSnap });
        }
        return { mode: 'par', ct: cur, layers, bits: 1024 };
    }

    async function decPar(enc, pwd) {
        let cur = enc.ct;
        for (let i = 3; i >= 0; i--) {
            const layer = enc.layers[i];
            const fp = await sha256(layer.snap);
            const key = await makeKey(pwd + '_L' + i, fp);
            cur = await aesDecrypt(key, layer.iv, cur);
        }
        return cur;
    }

    // ===== РЕЖИМ: OTP (One-Time Pad) =====
    async function encOTP(data, pwd, snap) {
        // Генерируем ключ той же длины, что и данные
        const key = new Uint8Array(data.length);
        const seedData = JSON.stringify(snap) + pwd;
        const seedHash = await sha256(seedData);
        
        // Заполняем ключ псевдослучайными байтами на основе seed
        for (let i = 0; i < data.length; i++) {
            const blockHash = await sha256(Array.from(seedHash).concat([i]));
            key[i] = blockHash[0];
        }

        // XOR
        const ct = new Uint8Array(data.length);
        for (let i = 0; i < data.length; i++) {
            ct[i] = data[i] ^ key[i];
        }

        return { mode: 'otp', ct, snap, bits: data.length * 8 };
    }

    async function decOTP(enc, pwd) {
        const seedData = JSON.stringify(enc.snap) + pwd;
        const seedHash = await sha256(seedData);
        
        const key = new Uint8Array(enc.ct.length);
        for (let i = 0; i < enc.ct.length; i++) {
            const blockHash = await sha256(Array.from(seedHash).concat([i]));
            key[i] = blockHash[0];
        }

        const pt = new Uint8Array(enc.ct.length);
        for (let i = 0; i < enc.ct.length; i++) {
            pt[i] = enc.ct[i] ^ key[i];
        }
        return pt;
    }

    // ===== UI =====
    function setMode(m, el) {
        mode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function updateUI() {
        const t = Date.now();
        document.getElementById('aqua').textContent = JSON.stringify(getAqua(t), null, 2);
        document.getElementById('veh').textContent = JSON.stringify(getVeh(t), null, 2);
        document.getElementById('moex').textContent = JSON.stringify(getMoex(t), null, 2);

        const ts = Math.floor(t / 1000);
        const fp = await sha256({ a: getAqua(ts), v: getVeh(ts), m: getMoex(ts), t: ts });
        document.getElementById('fp').textContent = 
            Array.from(fp).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ===== ДЕЙСТВИЯ =====
    window.doEncrypt = async function() {
        const res = document.getElementById('res');
        res.className = 'result info';
        res.textContent = '⏳ Шифрование...';

        try {
            const pwd = document.getElementById('pwd').value;
            const msg = document.getElementById('msg').value;
            const data = new TextEncoder().encode(msg);
            const ts = Math.floor(Date.now() / 1000);
            const snap = { a: getAqua(ts), v: getVeh(ts), m: getMoex(ts), t: ts };

            let enc;
            const start = Date.now();
            if (mode === 'std') enc = await encStd(data, pwd, snap);
            else if (mode === 'par') enc = await encPar(data, pwd, snap);
            else enc = await encOTP(data, pwd, snap);
            const dur = Date.now() - start;

            lastEnc = enc;
            res.className = 'result ok';
            res.innerHTML = `✅ Зашифровано (${enc.bits} бит)<br>Размер: ${enc.ct.length} байт<br>Время: ${dur}мс`;
        } catch (e) {
            res.className = 'result err';
            res.innerHTML = '❌ ' + e.message + '<br><pre>' + e.stack + '</pre>';
        }
    };

    window.doDecrypt = async function() {
        const res = document.getElementById('res');
        if (!lastEnc) { res.className = 'result err'; res.textContent = '❌ Сначала зашифруйте'; return; }
        res.className = 'result info';
        res.textContent = '⏳ Расшифровка...';

        try {
            const pwd = document.getElementById('pwd').value;
            let pt;
            const start = Date.now();
            if (lastEnc.mode === 'std') pt = await decStd(lastEnc, pwd);
            else if (lastEnc.mode === 'par') pt = await decPar(lastEnc, pwd);
            else pt = await decOTP(lastEnc, pwd);
            const dur = Date.now() - start;

            const text = new TextDecoder().decode(pt);
            res.className = 'result ok';
            res.innerHTML = `✅ Расшифровано<br>Сообщение: <b>${text}</b><br>Время: ${dur}мс`;
        } catch (e) {
            res.className = 'result err';
            res.innerHTML = '❌ ' + e.message + '<br><pre>' + e.stack + '</pre>';
        }
    };

    window.doTamper = async function() {
        const res = document.getElementById('res');
        if (!lastEnc) { res.className = 'result err'; res.textContent = '❌ Сначала зашифруйте'; return; }
        res.className = 'result info';
        res.textContent = '⏳ Атака...';

        try {
            const pwd = document.getElementById('pwd').value;
            const fakeTs = Math.floor(Date.now() / 1000) + 999999;
            const fakeSnap = { a: getAqua(fakeTs), v: getVeh(fakeTs), m: getMoex(fakeTs), t: fakeTs };
            
            const fakeEnc = { ...lastEnc };
            if (lastEnc.mode === 'std') fakeEnc.snap = fakeSnap;
            else if (lastEnc.mode === 'par') fakeEnc.layers = lastEnc.layers.map(l => ({ ...l, snap: { ...l.snap, t: fakeTs } }));
            else fakeEnc.snap = fakeSnap;

            let pt;
            if (fakeEnc.mode === 'std') pt = await decStd(fakeEnc, pwd);
            else if (fakeEnc.mode === 'par') pt = await decPar(fakeEnc, pwd);
            else pt = await decOTP(fakeEnc, pwd);

            res.className = 'result err';
            res.textContent = '⚠️ Расшифровалось (в симуляции возможно)';
        } catch (e) {
            res.className = 'result ok';
            res.innerHTML = `🛡️ ЗАЩИТА СРАБОТАЛА<br>${e.message}`;
        }
    };

    setInterval(updateUI, 1000);
    updateUI();
    </script>
</body>
</html>
